---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grist
spec:
  interval: 10m
  chart:
    spec:
      chart: ./k8s/appchart
      version: "x.x.x"
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  values:
    apps:
      - name: grist
        image: gristlabs/grist:1.7.12
        deploymentSpec:
          strategy:
            type: Recreate
        containerSpec:
          readinessProbe:
            httpGet:
              path: /status
              port: 8484
          livenessProbe:
            httpGet:
              path: /status
              port: 8484
        volumeMounts:
          - mountPath: /persist
            name: grist-data
        env:
          - name: GRIST_SANDBOX_FLAVOR
            value: gvisor
          - name: APP_HOME_URL
            value: "https://grist.egghead.infrao.top"
          - name: GRIST_SINGLE_ORG
            value: "homelab"
          - name: GRIST_TELEMETRY_LEVEL
            value: "off"
          - name: GRIST_DOCS_MINIO_USE_SSL
            value: "1"
          - name: GRIST_DOCS_MINIO_BUCKET
            value: grist-docs
          - name: GRIST_DOCS_MINIO_ENDPOINT
            value: ohara.infrao.top
          - name: GRIST_DOCS_MINIO_PORT
            value: "3900"
          - name: REDIS_URL
            value: "redis://grist-valkey:6379"
          - name: GRIST_OIDC_SP_HOST
            value: https://grist.egghead.infrao.top
          - name: GRIST_OIDC_IDP_ISSUER
            value: https://pocketid.egghead.infrao.top
          - name: GRIST_OIDC_IDP_SCOPES
            value: openid profile email
          - name: GRIST_OIDC_IDP_END_SESSION_ENDPOINT
            value: https://pocketid.egghead.infrao.top/api/oidc/end-session
          - name: GRIST_OIDC_SP_IGNORE_EMAIL_VERIFIED
            value: "true"
          - name: TZ
            value: Europe/Paris
        volumes:
          - name: grist-data
            persistentVolumeClaim:
              claimName: grist-data
        service: 8484
        ingress:
          domain: grist.egghead.infrao.top
        pvc:
          - name: grist-data
            localstorage: true
            backup: true
      - name: grist-valkey
        image: valkey/valkey:9.0.3-alpine
        service: 6379
