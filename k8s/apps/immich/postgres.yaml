apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-database-restore
  annotations:
    k8up.io/backup: "false"
spec:
  instances: 1

  storage:
    storageClass: nfs
    size: 1Gi

  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3

  postgresql:
    shared_preload_libraries:
      - "vchord.so"

  # plugins:
  #   - name: barman-cloud.cloudnative-pg.io
  #     isWALArchiver: true
  #     parameters:
  #       barmanObjectName: garage-immich-backup-store

  bootstrap:
    recovery:
      source: source
      # TODO: Use managed extensions (pg 18)
    # initdb:
    #   postInitApplicationSQL:
    #     # Commands based on: https://immich.app/docs/administration/postgres-standalone/#without-superuser-permission
    #     - CREATE EXTENSION vchord CASCADE;
    #     - CREATE EXTENSION earthdistance CASCADE;

  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: garage-immich-backup-store
          serverName: immich-database