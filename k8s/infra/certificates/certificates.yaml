---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-egghead-infrao-top
spec:
  secretName: wildcard-egghead-infrao-top-tls
  dnsNames:
    - egghead.infrao.top
    - "*.egghead.infrao.top"
    - egghead.cp0.infrao.top
    - "*.egghead.cp0.infrao.top"
  issuerRef:
    name: cloudflare
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name:  knock-up-stream-infrao-top-tls
spec:
  secretName: knock-up-stream-infrao-top-tls
  dnsNames:
    - knock-up-stream.infrao.top
    - knock-up-stream.cp0.infrao.top
  issuerRef:
    name: cloudflare
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name:  cloud-end-infrao-top-tls
spec:
  secretName: cloud-end-infrao-top-tls
  dnsNames:
    - cloud-end.infrao.top
    - cloud-end.cp0.infrao.top
  issuerRef:
    name: cloudflare
    kind: Issuer
