---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: fairwinds
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.fairwinds.com/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: flux-system
spec:
  interval: 10m
  timeout: 20m
  chart:
    spec:
      chart: goldilocks
      version: "10.3.0"
      sourceRef:
        kind: HelmRepository
        name: fairwinds
  values:
    controller:
      enabled: true
      flags:
        on-by-default: true
        exclude-namespaces: default
    dashboard:
      enabled: true
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - host: vpa.egghead.infrao.top
            paths:
              - path: /
                type: ImplementationSpecific
        tls:
          - hosts:
            - vpa.egghead.infrao.top


