---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: fairwinds
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.fairwinds.com/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: vpa
spec:
  interval: 10m
  timeout: 20m
  releaseName: goldilocks
  targetNamespace: vpa
  chart:
    spec:
      chart: goldilocks
      version: "10.3.0"
      sourceRef:
        kind: HelmRepository
        name: fairwinds
        namespace: flux-system
  values:
    controller:
      enabled: true
      flags:
        on-by-default: true
        exclude-namespaces: default
    dashboard:
      enabled: false
