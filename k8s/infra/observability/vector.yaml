---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vectordotdev
  namespace: victoriametrics
spec:
  interval: 1h
  url: oci://ghcr.io/vectordotdev/helm-charts/vector
  ref:
    tag: 0.51.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: victoriametrics
  name: vector
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: vectordotdev
    namespace: victoriametrics
  values:
    role: "Agent"
    image:
      repository: docker.io/timberio/vector
      tag: 0.54.0-debian
    service:
      enabled: false
    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: false
#       address: 0.0.0.0:8686
      sources:
        egghead_k3s:
          type: kubernetes_logs
        egghead_journald:
          type: journald
      transforms:
        journald_normalized:
          type: remap
          inputs:
            - egghead_journald
          source: |
            .host = .host ?? .HOSTNAME ?? "unknown"
            .service = .SYSLOG_IDENTIFIER ?? .unit ?? "unknown"
            .message = .message ?? ._COMM ?? ""
            # Drop noisy systemd fields to save storage
            del(._BOOT_ID, ._MACHINE_ID, ._SYSTEMD_CGROUP, ._TRANSPORT)
        k8s_normalized:
          type: remap
          inputs:
            - egghead_k3s
          source: |
            .host = .kubernetes.node_name ?? .host ?? "unknown"
            .namespace = .kubernetes.pod_namespace ?? "unknown"
            .pod = .kubernetes.pod_name ?? "unknown"
            .container = .kubernetes.container_name ?? "unknown"
            # Drop heavy k8s metadata you don't need
            del(.kubernetes.pod_labels, .kubernetes.pod_annotations)
      sinks:
        vlogs_container:
          type: elasticsearch
          endpoints: 
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - k8s_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,container_name
        vlogs_systemd:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - journald_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,container_name
