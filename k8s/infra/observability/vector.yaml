---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vectordotdev
  namespace: victoriametrics
spec:
  interval: 1h
  url: oci://ghcr.io/vectordotdev/helm-charts/vector
  ref:
    tag: 0.51.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: victoriametrics
  name: vector
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: vectordotdev
    namespace: victoriametrics
  values:
    role: "Agent"
    image:
      repository: docker.io/timberio/vector
      tag: 0.54.0-debian
    service:
      enabled: false
    envFrom:
      - secretRef:
          name: vector-creds
    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: true
        address: 0.0.0.0:8686
      sources:
        egghead_k3s:
          type: kubernetes_logs
        egghead_journald:
          type: journald
          journal_directory: /var/log/journal
        skypiea_logs:
          type: nats
          connection_name: egghead_vector
          subject: skypiea.logs
          auth:
            strategy: nkey
            nkey:
              nkey: UDVHQU3IJW2OAIW4SBQRMRPNKGXB3LNM3AYH3TYSYXQ4HHH2R5B4R6MX
              seed: "${VECTOR_NATS_SEED}"
          tls:
            enabled: true
          url: nats://logs.skypiea.infrao.top:443
      transforms:
        journald_normalized:
          type: remap
          inputs:
            - egghead_journald
          source: |
            .service = string(._SYSTEMD_UNIT) ?? "unknown"
            .message = string(.message) ?? string(._COMM) ?? ""
            del(._MACHINE_ID)
            del(._SYSTEMD_CGROUP)
            del(._TRANSPORT)
        k8s_normalized:
          type: remap
          inputs:
            - egghead_k3s
          source: |
            .host = string(.kubernetes.pod_node_name) ?? "egghead"
            .namespace = string(.kubernetes.pod_namespace) ?? "unknown"
            .pod = string(.kubernetes.pod_name) ?? "unknown"
            .container = string(.kubernetes.container_name) ?? "unknown"
            del(.kubernetes.pod_labels)
            del(.kubernetes.pod_annotations)
        skypiea_normalized:
          type: remap
          inputs:
            - skypiea_logs
          source: |
            .host = string(.kubernetes.pod_node_name) ?? "skypiea"
            .container = string(.container_name) ?? "unknown"
      sinks:
        vlogs_container:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - k8s_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,namespace,pod,container
        vlogs_container_nats:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - skypiea_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,container
        vlogs_systemd:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - journald_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,service
