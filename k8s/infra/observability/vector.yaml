---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vectordotdev
  namespace: victoriametrics
spec:
  interval: 1h
  url: oci://ghcr.io/vectordotdev/helm-charts/vector
  ref:
    tag: 0.56.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: victoriametrics
  name: vector-egghead
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: vectordotdev
    namespace: victoriametrics
  values:
    role: "Agent"
    image:
      repository: docker.io/timberio/vector
      tag: 0.56.0-debian
    service:
      enabled: true
      type: ClusterIP
      port:
        - name: promgw
          port: 9091
          protocol: TCP
          targetPort: promgw
    rbac:
      extraRules:
        - apiGroups: [""]
          resources: ["nodes/proxy"]
          verbs: ["get"]
    env:
      - name: TZ
        value: Europe/Paris
    envFrom:
      - secretRef:
          name: vector-creds
    command: [ "/bin/sh", "-c" ]
    args: 
      - |-
        export K8S_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
        exec vector --config-dir /etc/vector/
    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: true
        address: 0.0.0.0:8686
      sources:
        egghead_host_metrics:
          type: prometheus_scrape
          endpoints:
            - http://cert-manager.cert-manager:9402/metrics
            - http://cert-manager-cainjector.cert-manager:9402/metrics
            - http://cert-manager-webhook.cert-manager:9402/metrics
            - http://kube-state-metrics:8080/metrics
            - http://k8up-metrics.k8up-system:8080/metrics
            - http://kube-dns.kube-system:9153/metrics
            - http://node-exporter-prometheus-node-exporter:9100/metrics
            - http://traefik-metrics.ingress:9100/metrics
          scrape_interval_secs: 15
        egghead_k3s_logs:
          type: kubernetes_logs
        egghead_k3s_metrics:
          type: prometheus_scrape
          auth:
            strategy: bearer
            token: "$K8S_TOKEN"
          endpoints:
            - https://kubernetes.default.svc/api/v1/nodes/$VECTOR_SELF_NODE_NAME/proxy/metrics/cadvisor
          scrape_interval_secs: 30
          tls:
            ca_file: /run/secrets/kubernetes.io/serviceaccount/ca.crt
        egghead_k8up:
          type: prometheus_scrape
          address: 0.0.0.0:9091
          endpoints:
            - http://prometheus-pushgateway.victoriametrics:9091/metrics
          scrape_interval_secs: 7200
        egghead_journald:
          type: journald
          journal_directory: /var/log/journal
      transforms:
        egghead_container_metrics_filter:
          type: filter
          inputs: 
            - egghead_k3s_metrics
          condition:
            type: vrl
            source: '.tags.container != ""'
        remap_hostmetrics:
          type: remap
          inputs:
            - egghead_k8up
            - egghead_host_metrics
            - k8s_metrics_remap
          source: |
            .tags.host = "egghead"
        journald_normalized:
          type: remap
          inputs:
            - egghead_journald
          source: |
            .service = string(._SYSTEMD_UNIT) ?? "unknown"
            .message = string(.message) ?? string(._COMM) ?? ""
            .level = to_syslog_level(to_int!(.PRIORITY)) ?? "unknown"
            if .service == "ssh.service" {
              err = null
              parse.user = null
              parse.port = null

              if starts_with(.message, "Disconnected") {
                  parse, err = parse_regex(.message, r'Disconnected from invalid user (?P<user>.+) (?P<ip>((\d{1,3}.){3}.(\d{1,3}))|(?:(?:[a-fA-F0-9]*)?:){1,7}[A-Fa-f0-9]*) port (?P<port>\d+).*')
                  .ssh.log_type = "invalid user"
                  .level = "notice"
              } else if starts_with(.message, "Invalid") {
                  parse, err = parse_regex(.message, r'Invalid user (?P<user>.+) from (?P<ip>((\d{1,3}.){3}.(\d{1,3}))|(?:(?:[a-fA-F0-9]*)?:){1,7}[A-Fa-f0-9]*) port (?P<port>\d+).*')
                  .ssh.log_type = "invalid user"
                  .level = "notice"
              } else if starts_with(.message, "Received") {
                  parse, err = parse_regex(.message, r'Received disconnect from (?P<ip>((\d{1,3}.){3}.(\d{1,3}))|(?:(?:[a-fA-F0-9]*)?:){1,7}[A-Fa-f0-9]*) port (?P<port>\d+).*')
                  .ssh.log_type = "tcp check"
                  .level = "notice"
              } else if starts_with(.message, "Accepted") {
                  parse, err = parse_regex(.message, r'Accepted publickey for (?P<user>.+) from (?P<ip>((\d{1,3}.){3}.(\d{1,3}))|(?:(?:[a-fA-F0-9]*)?:){1,7}[A-Fa-f0-9]*) port (?P<port>\d+) .+: (?P<key_alg>\S+) (?P<hash_alg>\S+):(?P<hash>.+)')
                  .ssh.log_type = "allow user"
                  .ssh.key.hash = parse.hash
                  .ssh.key.hash_alg = parse.hash_alg
                  .ssh.key.key_alg = parse.key_alg
                  .level = "notice"
              } else if match(.message, r'pam_unix') {
                  parse, err = parse_regex(.message, r'.*pam_unix.*: session (?P<action>\S+) for user (?P<user>\S+)(\(uid=(?P<uid>\d+)\) by (?P<auser>\S+).uid=(?P<auid>\d+).)?$')
                  .pam.from.user = parse.user
                  .pam.from.uid = parse.uid
                  .pam.to.user = parse.auser
                  .pam.to.uid = parse.auid
                  .pam.action = parse.action
                  if parse.auid == 0 {
                      .ssh.log_type = "root access"
                      .level = "warn"
                  } else {
                      .ssh.log_type = "user switch"
                      .level = "info"
                  }
              } else if starts_with(.message, "Connection") {
                  parse, err = parse_regex(.message, r'Connection (?P<tcp_action>.+) by (?P<reason>.+) user (?P<user>.+) (?P<ip>((\d{1,3}.){3}.(\d{1,3}))|(?:(?:[a-fA-F0-9]*)?:){1,7}[A-Fa-f0-9]*) port (?P<port>\d+).*')
                  .ssh.log_type = "invalid user"
                  .ssh.tcp_action = parse.tcp_action
                  .level = "warn"
              }

              if err == null {
                  .ssh.user = parse.user
                  .src.ip = parse.ip
                  .src.port = to_int(parse.port) ?? parse.port
              } else {
                  .err = err
              }
            }
            del(._MACHINE_ID)
            del(._SYSTEMD_CGROUP)
            del(._TRANSPORT)
        k8s_metrics_remap: 
          type: remap
          inputs:
            - egghead_container_metrics_filter
          source: |-
            pod_name, err = string(.tags.pod)
            if err == null {
              # CronJob : <nom>-<epoch5c>-<hash5c>  (ex: mycron-28123456-xk2p9)
              if match(pod_name, r'^(?P<name>.+)-\d{8,}-[a-z0-9]{5}$') {
                  captures = parse_regex!(pod_name, r'^(?P<name>.+)-\d{8,}-[a-z0-9]{5}$')
                  .tags.workload_type = "cronjob"
                  .tags.workload_name = captures.name
                  .tags.workload_ref  = "cronjob/" + captures.name

              # Deployment : <nom>-<template-hash 9-10c>-<pod-hash 5c>
              } else if match(pod_name, r'^(?P<name>.+)-[a-z0-9]{9,10}-[a-z0-9]{5}$') {
                  captures = parse_regex!(pod_name, r'^(?P<name>.+)-[a-z0-9]{9,10}-[a-z0-9]{5}$')
                  .tags.workload_type = "deployment"
                  .tags.workload_name = captures.name
                  .tags.workload_ref  = "deployment/" + captures.name

              # StatefulSet : <nom>-<index entier>  (ex: myapp-0, myapp-12)
              } else if match(pod_name, r'^(?P<name>.+)-\d+$') {
                  captures = parse_regex!(pod_name, r'^(?P<name>.+)-\d+$')
                  .tags.workload_type = "statefulset"
                  .tags.workload_name = captures.name
                  .tags.workload_ref  = "sts/" + captures.name

              # DaemonSet / Job "bare" : <nom>-<hash5c>
              # Pas de double suffixe → DaemonSet ou Job sans CronJob parent
              } else if match(pod_name, r'^(?P<name>.+)-[a-z0-9]{5}$') {
                  captures = parse_regex!(pod_name, r'^(?P<name>.+)-[a-z0-9]{5}$')
                  .tags.workload_name = captures.name
                  if match(captures.name, r'^(vector|svclb)') {
                      .tags.workload_type = "daemonset"
                      .tags.workload_ref  = "daemonset/" + captures.name
                  } else {
                      .tags.workload_type = "job"
                      .tags.workload_ref  = "job/" + captures.name
                  }
              # Fallback : pod statique ou nom custom
              } else {
                  .tags.workload_type = "pod"
                  .tags.workload_name = pod_name
                  .tags.workload_ref  = "pod/" + pod_name
              }
            }
            del(.tags.id)
            del(.tags.name)
        k8s_normalized:
          type: remap
          inputs:
            - egghead_k3s_logs
          source: |
            .host      = string(.kubernetes.pod_node_name) ?? "egghead"
            .namespace = string(.kubernetes.pod_namespace) ?? "unknown"
            .pod       = string(.kubernetes.pod_name)      ?? "unknown"
            .container = string(.kubernetes.container_name) ?? "unknown"
            del(.kubernetes.pod_labels)
            del(.kubernetes.pod_annotations)

            level_map = {
              "inf": "info",  "information": "info",
              "wrn": "warn",  "warning": "warn",
              "err": "error",
              "dbg": "debug",
              "trc": "trace",
              "ftl": "fatal", "panic": "fatal"
            }

            # ── Parsing du message ──────────────────────────────────────────────────
            msg = string(.message) ?? ""

            # Strip préfixe zerolog : "Jun 10 16:24:42 INF Request <logfmt...>"
            # ou plus généralement : "<timestamp> <LEVEL> <OptionalLabel> <logfmt...>"
            zerolog_match, zerolog_err = parse_regex(msg,
              r'^(?:(?P<ts>\w{3}\s+\d+\s+\d{2}:\d{2}:\d{2})\s+(?P<level>\w+)\s+)?(?P<label>(?:\w+\s+)+)(?P<inner>\w+=\S+.*)$'
            )
            if zerolog_err == null {
                raw_level = downcase(to_string(zerolog_match.level))
                .level = get(level_map, [raw_level]) ?? raw_level
                msg = string(zerolog_match.inner) ?? ""
            }

            # 1. JSON
            if starts_with(msg, "{") && ends_with(msg, "}") {
              parsed, err = parse_json(msg)
              if err == null {
                .log_format = "json"
                . |= object(parsed) ?? {}
              }

              # Gestion logs mongo
              if exists(.attr.message.verbose_level) {
                .level = downcase(to_string!(.attr.message.verbose_level))
              }
              if exists(.attr.message.msg) {
                .message = .attr.message.msg
              }

            # 2. klog  ->  I0609 14:33:36.477676 1 vpa.go:334] ...
            } else if match(msg, r'^[IWEF]\d{4} ') {
              parsed, err = parse_klog(msg)
              if err == null {
                .log_format = "klog"
                . |= parsed
                .level = to_string(.level)
              }

            # 3. logfmt  ->  time=... level=... msg=...
            } else if match(msg, r'^\w+=\S+') {
              parsed, err = parse_key_value(msg)
              if err == null {
                .log_format = "logfmt"
                . |= object(parsed)
                # Normaliser le champ timestamp logfmt
                if exists(.time) && !exists(.timestamp) {
                  .timestamp = parse_timestamp(string(.time) ?? "", "%+") ?? null
                }
              }

            # 4. Syslog  ->  <PRI>timestamp hostname app[pid]: msg
            } else if match(msg, r'^<\d+>') || match(msg, r'^\w{3}\s+\d+ \d{2}:\d{2}:\d{2}') {
              parsed, err = parse_syslog(msg)
              if err == null {
                .log_format = "syslog"
                . |= parsed
              }

            # 5. Format non reconnu → on garde le message brut
            } else {
              .log_format = "raw"
            }

            if !exists(.level) || .level == "unknown" {
              
              raw = to_string(.message) ?? ""
              detected = null

              # Lookup table : {pattern, level}
              level_patterns = [
                # Gitea : [I] [W] [E] [D]
                { "pattern": r'\[I\]',       "level": "info"  },
                { "pattern": r'\[W\]',       "level": "warn"  },
                { "pattern": r'\[E\]',       "level": "error" },
                { "pattern": r'\[D\]',       "level": "debug" },

                # Bracket long : [INFO] [WARNING] [ERROR] [DEBUG]
                { "pattern": r'\[INFO\]',    "level": "info"  },
                { "pattern": r'\[Info\]',    "level": "info"  },
                { "pattern": r'\[info\]',    "level": "info"  },
                { "pattern": r'\[WARNING\]', "level": "warn"  },
                { "pattern": r'\[Warning\]', "level": "warn"  },
                { "pattern": r'\[warning\]', "level": "warn"  },
                { "pattern": r'\[ERROR\]',   "level": "error" },
                { "pattern": r'\[Error\]',   "level": "error" },
                { "pattern": r'\[error\]',   "level": "error" },
                { "pattern": r'\[DEBUG\]',   "level": "debug" },
                { "pattern": r'\[Debug\]',   "level": "debug" },
                { "pattern": r'\[debug\]',   "level": "debug" },
                { "pattern": r'\[NOTICE\]',  "level": "notice"},
                { "pattern": r'\[Notice\]',  "level": "notice"},
                { "pattern": r'\[notice\]',  "level": "notice"},

                # Uptime Kuma : [MONITOR] WARN: / INFO: / ERROR:
                { "pattern": r'\[MONITOR\]\s+WARN',  "level": "warn"  },
                { "pattern": r'\[MONITOR\]\s+INFO',  "level": "info"  },
                { "pattern": r'\[MONITOR\]\s+ERROR', "level": "error" },

                # Redis : "1:M" "4920:C" "123:S" suivi de * ou #
                { "pattern": r'^\d+:[MCSRAX] .+ \*',  "level": "info"  },
                { "pattern": r'^\d+:[MCSRAX] .+ #',   "level": "warn"  },
                { "pattern": r'^\d+:[MCSRAX] .+ -',   "level": "error" },

                # Mots clés en fin de recours
                { "pattern": r'(?i)\bERROR\b',   "level": "error" },
                { "pattern": r'(?i)\bWARN\b',    "level": "warn"  },
                { "pattern": r'(?i)\bWARNING\b', "level": "warn"  },
                { "pattern": r'(?i)\bDEBUG\b',   "level": "debug" },
                { "pattern": r'(?i)\bFATAL\b',   "level": "fatal" },
                { "pattern": r'(?i)\bCRITICAL\b',"level": "fatal" },
              ]

              for_each(level_patterns) -> |_i, entry| {
                if detected == null && match(raw, entry.pattern) {
                  detected = entry.level
                }
              }

              if detected != null {
                .level = detected
              }
            }

            # ── Normalisation du level ──────────────────────────────────────────────
            # Ramène tous les champs level/severity/lvl vers .level normalisé
            if !exists(.level) {
                .level = string(.severity) ?? string(.lvl) ?? string(.log_level) ?? "unknown"
            }
            del(.severity)
            del(.lvl)
            del(.log_level)

            .level = downcase(string(.level) ?? "unknown")

            .level = if .level == "i" || .level == "info"                         { "info"  }
                else if .level == "w" || .level == "warn" || .level == "warning"  { "warn"  }
                else if .level == "e" || .level == "err"  || .level == "error"    { "error" }
                else if .level == "f" || .level == "fatal" || .level == "crit"    { "fatal" }
                else if .level == "d" || .level == "debug"                        { "debug" }
                else                                                              { "unknown" }

            # ── Nettoyage final ─────────────────────────────────────────────────────
            del(.kubernetes)
            del(.source_type)
        k8s_log_split:
          type: route
          inputs: 
            - k8s_normalized
          reroute_unmatched: true
          route: 
            botcoin_logs:
              source: 'starts_with(to_string!(.namespace), "botcoin")'
              type: vrl
      sinks:
        vlogs_container:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - k8s_log_split._unmatched
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,namespace,pod,container
        vlogs_botcoin:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - k8s_log_split.botcoin_logs
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,namespace,pod,container
          request:
            headers:
              AccountID: "1"
              ProjectID: "1"
        vlogs_systemd:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - journald_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,service
        victoriametrics_sink:
          type: prometheus_remote_write
          inputs:
            - remap_hostmetrics
          endpoint: http://victoria-metrics-victoria-metrics-single-server:8428/api/v1/write
          healthcheck:
            enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  namespace: victoriametrics
  name: vector-skypiea
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: vectordotdev
    namespace: victoriametrics
  values:
    role: "Stateless-Aggregator"
    image:
      repository: docker.io/timberio/vector
      tag: 0.56.0-debian
    service:
      enabled: true
      type: LoadBalancer
      port:
        - name: syslog
          port: 9000
          protocol: UDP
          targetPort: syslog
      externalTrafficPolicy: Cluster
    env:
      - name: TZ
        value: Europe/Paris
    envFrom:
      - secretRef:
          name: vector-creds
    extraVolumes:
      - name: geoip-db
        emptyDir: {}
    extraVolumeMounts:
      - name: geoip-db
        mountPath: /geoip
    initContainers:
      - name: geoip-updater
        image: ghcr.io/maxmind/geoipupdate:latest
        env:
          - name: GEOIPUPDATE_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: vector-creds
                key: GEOIP_ACCOUNT_ID
          - name: GEOIPUPDATE_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: vector-creds
                key: GEOIP_LICENSE_KEY
          - name: GEOIPUPDATE_EDITION_IDS
            value: "GeoLite2-City"
          - name: GEOIPUPDATE_DB_DIR
            value: /geoip
        volumeMounts:
          - name: geoip-db
            mountPath: /geoip

    customConfig:
      data_dir: /vector-data-dir
      enrichment_tables:
        geoip_table:
          type: geoip
          path: /geoip/GeoLite2-City.mmdb
      api:
        enabled: true
        address: 0.0.0.0:8686
      sources:
        routers_metrics_kus:
          type: prometheus_scrape
          endpoints:
            - http://knock-up-stream.infrao.top:9100/metrics
        routers_metrics_ce:
          type: prometheus_scrape
          endpoints:
            - http://cloud-end.infrao.top:9100/metrics
        routers_syslog_logs:
          type: syslog
          address: 0.0.0.0:9000
          mode: udp
        skypiea_logs:
          type: nats
          connection_name: egghead_vector
          subject: skypiea.logs
          auth:
            strategy: nkey
            nkey:
              nkey: UDVHQU3IJW2OAIW4SBQRMRPNKGXB3LNM3AYH3TYSYXQ4HHH2R5B4R6MX
              seed: "${VECTOR_NATS_SEED}"
          tls:
            enabled: true
            server_name: logs.skypiea.infrao.top 
          url: wss://logs.skypiea.infrao.top:4222
        skypiea_metrics_json:
          type: nats
          connection_name: egghead_vector_metrics
          subject: skypiea.metrics
          auth:
            strategy: nkey
            nkey:
              nkey: UDVHQU3IJW2OAIW4SBQRMRPNKGXB3LNM3AYH3TYSYXQ4HHH2R5B4R6MX
              seed: "${VECTOR_NATS_SEED}"
          tls:
            enabled: true
            server_name: logs.skypiea.infrao.top 
          url: wss://logs.skypiea.infrao.top:4222
      transforms:
        add_kus_host_tag_metrics:
          type: remap
          inputs:
            - routers_metrics_kus
          source: |
            .tags.host = "knock-up-stream"
        add_ce_host_tag_metrics:
          type: remap
          inputs:
            - routers_metrics_ce
          source: |
            .tags.host = "cloud-end"
        skypiea_metrics_normalized:
          type: remap
          inputs:
            - skypiea_metrics_json
          source: |
            . = parse_json!(.message)
            .tags.host = .host

            if exists(.gauge.value)     && .gauge.value     == null { abort }
            if exists(.counter.value)   && .counter.value   == null { abort }
            if exists(.histogram.value) && .histogram.value == null { abort }
            if exists(.summary.value)   && .summary.value   == null { abort }
            if exists(.set.value)       && .set.value       == null { abort }

            # Aplatir les valeurs
            if exists(.gauge.value)     { .gauge.value     = to_float!(.gauge.value) }
            if exists(.counter.value)   { .counter.value   = to_float!(.counter.value) }
            if exists(.histogram.value) { .histogram.value = to_float!(.histogram.value) }
            if exists(.summary.value)   { .summary.value   = to_float!(.summary.value) }
            if exists(.set.value)       { .set.value       = to_float!(.set.value) }

            del(.message)
            del(.timestamp)
            del(.source_type)
            del(.subject)
        logs_to_metrics:
          type: log_to_metric
          inputs: 
            - skypiea_metrics_normalized
          all_metrics: true
          metrics: []
        routers_normalized:
          type: remap
          inputs:
            - routers_syslog_logs
          source: |
            .host = .hostname
            .level = .severity
            .service = .appname
            if .service == "netbird" {
              raw = to_string(.message) ?? ""

              # Lookup table : {pattern, level}
              level_map = [
                { "key":r'INFO', "level":"info" },
                { "key":r'WARN', "level":"warn" },
                { "key":r'ERROR', "level":"error" },
                { "key":r'DEBUG', "level":"debug" },
                { "key":r'TRACE', "level":"trace" },
                { "key":r'FATAL', "level":"fatal" }
              ]
              detected = null
              for_each(level_map) -> |_i, entry| {
                if detected == null && match(raw, entry.key) {
                  detected = entry.level
                }
              }
              if detected != null {
                .level = detected
              }
            }
            del(.hostname)
            del(.severity)
            del(.appname)
        skypiea_normalized:
          type: remap
          inputs:
            - skypiea_logs
          source: |
            # ignore `err` at runtime
            . = parse_json!(.message)
            .host = string(.kubernetes.pod_node_name) ?? "skypiea"
            .container = string(.container_name) ?? "unknown"
            # Normalize message field
            if .container == "unknown" && .service == "unknown" {
              raw_message = string(._msg) ?? string(.message) ?? ""

              # Guard: check that the message starts with "[UFW" as 1st word
              words = split(raw_message, " ")
              words[0] = to_string(words[0])

              if length(words) < 1 || !starts_with(words[0], "[UFW") {
                .parsed = false
                .skip_reason = "Not a UFW log entry"
              } else {
                # Extract UFW action from the tag e.g. [UFW BLOCK]
                action_parsed, action_err = parse_regex(raw_message, r'^\[UFW\s+(?P<ufw_action>\w+)\]')

                if action_err != null {
                  .parse_error = action_err
                  .parsed = false
                } else {
                  .service = "ufw"
                  .action = action_parsed.ufw_action  # "BLOCK", "ALLOW", etc.

                  # Parse key=value pairs from the rest of the message
                  # UFW logs are structured as KEY=VALUE pairs after the tag
                  kv_parsed, kv_err = parse_key_value(raw_message, key_value_delimiter: "=", field_delimiter: " ", whitespace: "strict")

                  if kv_err != null {
                    .parse_error = kv_err
                    .parsed = false
                  } else {
                    .in_interface  = string(kv_parsed.IN)    ?? null
                    .out_interface = string(kv_parsed.OUT)   ?? null
                    .src.ip        = string(kv_parsed.SRC)   ?? null
                    .dst.ip        = string(kv_parsed.DST)   ?? null
                    .proto         = string(kv_parsed.PROTO) ?? null
                    .src.port      = to_int(kv_parsed.SPT)   ?? null
                    .dst.port      = to_int(kv_parsed.DPT)   ?? null
                    .ttl           = to_int(kv_parsed.TTL)   ?? null
                    .mac           = string(kv_parsed.MAC)   ?? null
                    .length        = to_int(kv_parsed.LEN)   ?? null
                    .parsed        = true
                  }
                }
              }
            }

            if .container_name == "garage" {
                .message = strip_ansi_escape_codes!(.message)

                parsed, err = parse_regex( .message, r'^(?P<timestamp>\S+)\s+(?P<level>\w+)\s+(?P<component>[^:]+::[^\:]+):\s+(?P<msg>.*)$' )

                if err == null {
                  .timestamp = parse_timestamp!(parsed.timestamp, "%+")
                  .level = downcase!(parsed.level)
                  .component = parsed.component
                  .message = parsed.msg
                }

                ip_match, err = parse_regex(.message, r'(?P<ip>\d+\.\d+\.\d+\.\d+|\[::ffff:[^\]]+\])')
                  if err == null {
                  .src.ip = ip_match.ip
                }

                http_match, err = parse_regex(.message, r'(?P<method>GET|POST|PUT|DELETE|HEAD)\s+(?P<path>/\S+)')
                if err == null {
                  .http.method = http_match.method
                  .http.path = http_match.path
                }

                status_match, err = parse_regex(.message, r'Response:\s+error\s+(?P<status>\d{3})')
                if err == null {
                  .http.status = to_int!(status_match.status)
                }

                .structured.raw = .message
            } else if .container_name == "traefik" {

                parsed, err = parse_json(.message)

                if err == null {
                  .parsed = parsed
                }

                if exists(.parsed.time) {
                  .timestamp = parse_timestamp!(.parsed.time, "%+")
                }

                if exists(.parsed.level) {
                  .level = downcase(to_string(.parsed.level) ?? "info")
                }

                if exists(.parsed.message) && .parsed.message != "" {
                  .message = .parsed.message
                }

                if exists(.parsed.RequestMethod) && exists(.parsed.RequestPath) {
                  .http.method = .parsed.RequestMethod
                  .http.path = .parsed.RequestPath
                  .http.host = .parsed.RequestHost
                  .http.status = to_int!(.parsed.DownstreamStatus)

                  .src.ip = .parsed.ClientHost
                  .src.port = to_int!(.parsed.ClientPort)

                  .backend.service = .parsed.ServiceName
                  .message =
                      (to_string(.parsed.ClientHost) ?? "?") + " " +
                      (to_string(.parsed.RequestMethod) ?? "?") + " " +
                      (to_string(.parsed.RequestHost) ?? "?") + " " +
                      (to_string(.parsed.RequestPath) ?? "?")     
                }

                # Parse geoblock logs
                raw_message = string(.message) ?? string(._msg) ?? ""

                # Guard: check that the 2nd word is "GeoBlock"
                words = split(raw_message, " ")

                if length(words) < 2 || words[1] != "GeoBlock:" {
                  .parsed = false
                  .skip_reason = "Not a GeoBlock log entry"
                } else {
                  # Extract all fields from the GeoBlock message using regex
                  parsed, err = parse_regex(raw_message, r'^(?P<log_level>\w+):\s+(?P<plugin_name>\S+):\s+(?P<datetime>\d{4}/\d{2}/\d{2}\s+\d{2}:\d{2}:\d{2})\s+(?P<plugin_instance>\S+):\s+request\s+(?P<action>allowed|denied)\s+\[(?P<ip>[\d.]+)\]\s+for\s+country\s+\[(?P<country>[A-Z]+)\]')

                  if err != null {
                    .parse_error = err
                    .parsed = false
                  } else {
                    .level        = parsed.log_level      
                    .datetime         = parsed.datetime       
                    .plugin_name      = parsed.plugin_instance
                    .action           = parsed.action         
                    .src.ip           = parsed.ip             
                    .src.country      = parsed.country        
                    .parsed           = true

                    # Optionally parse datetime into a proper timestamp
                    .timestamp_parsed = parse_timestamp(.datetime, format: "%Y/%m/%d %H:%M:%S") ?? null
                  }
                }
            } else if .container_name == "doco-cd" {

                parsed, err = parse_json(.message)

                if err == null {
                  .parsed = parsed
                }

                if exists(.parsed.time) {
                  .timestamp = parse_timestamp!(.parsed.time, "%+")
                }

                if exists(.parsed.level) {
                  .level = downcase(to_string(.parsed.level) ?? "info")
                }

                if exists(.parsed.msg) {
                  .message = to_string!(.parsed.msg)
                }

                msg = to_string!(.message)

                if contains(msg, "polling repository") {
                  .event.type = "poll"
                } else if contains(msg, "deploying stack") {
                  .event.type = "deploy_start"
                } else if contains(msg, "deployment in progress") {
                  .event.type = "deploy_progress"
                } else if contains(msg, "job completed successfully") {
                  .event.type = "job_success"
                } else if contains(msg, "new application version available") {
                  .event.type = "version_warning"
                } else if contains(msg, "starting application") {
                  .event.type = "startup"
                }

                if exists(.parsed.repository) {
                  .repo = .parsed.repository
                }

                if exists(.parsed.job_id) {
                  .job.id = .parsed.job_id
                }

                if exists(.parsed.elapsed_time) {
                  secs, err = parse_regex(.parsed.elapsed_time, r'(?P<val>[0-9.]+)')
                  if err == null {
                    .metrics.elapsed_seconds = to_float!(secs.val)
                  }
                }

                if exists(.parsed.next_run) {
                  .schedule.next_run = parse_timestamp!(.parsed.next_run, "%+")
                }
            }

            # =========================
            # GEOIP ENRICHMENT
            # =========================
            if exists(.src.ip) && .src.ip != null {
              geo, err = get_enrichment_table_record("geoip_table", {"ip": string!(.src.ip)})
              if err == null {
                .src.geo = geo
              }
            }
            # =========================
            # FINAL GUARANTEES
            # =========================
            if !exists(.timestamp) {
              .timestamp = now()
            }

            .message = to_string!(.message)

            if exists(.label) {
              del(.label)
            }
        skypiea_route:
          type: route
          inputs:
            - skypiea_normalized
          route:
            known_container: .container != "unknown"
            unknown_container: .container == "unknown"
      sinks:
        victoriametrics_sink:
          type: prometheus_remote_write
          inputs:
            - logs_to_metrics
            - add_ce_host_tag_metrics
            - add_kus_host_tag_metrics
          endpoint: http://victoria-metrics-victoria-metrics-single-server:8428/api/v1/write
          healthcheck:
            enabled: false
        vlogs_containers:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - skypiea_route.known_container
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,container
        vlogs_system:
          type: elasticsearch
          endpoints:
            - http://victoria-logs-victoria-logs-single-server:9428/insert/elasticsearch/
          inputs:
            - skypiea_route.unknown_container
            - routers_normalized
          compression: gzip
          healthcheck:
            enabled: false
          query:
            _msg_field: message
            _time_field: timestamp
            _stream_fields: host,service